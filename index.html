<!DOCTYPE html>
<html lang="en">
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Banquet Potluck</title>
<style>
body{font-family:Arial,sans-serif;background:#f4ebff;margin:0;padding:30px;color:#5b21b6;overflow-x:hidden;}
.container{max-width:1400px;margin:auto;}
.top-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:30px;}
.card,.player-card,.modal-box{background:white;border-radius:20px;padding:20px;box-shadow:0 10px 25px rgba(109,40,217,.08);}
.player-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.player-card{cursor:pointer;text-align:center;transition:.2s;}
.player-card:hover{transform:translateY(-4px);}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;}
.modal-box{width:400px;}
input,select,button{width:100%;padding:12px;margin-top:10px;border-radius:12px;border:1px solid #ddd;}
button{background:linear-gradient(135deg,#8b5cf6,#c084fc);color:white;border:none;font-weight:bold;cursor:pointer;}
.status-done{color:green;font-weight:bold;}
.status-pending{color:#999;}
.counter{font-size:48px;text-align:center;font-weight:bold;}
.confetti{position:fixed;top:-10px;font-size:20px;animation:fall 2s linear forwards;pointer-events:none;}
@keyframes fall{to{transform:translateY(100vh) rotate(360deg);opacity:0;}}
</style>
</head>
<body>
<div class="container">
<h1 style="text-align:center;">🎾 End of Year Tennis Banquet Potluck</h1>

<div class="top-grid">
  <div class="card">
    <h2>Signup Tracker</h2>
    <div id="statusBoard"></div>
  </div>

  <div class="card">
    <h2>Total Attendance</h2>
    <div class="counter" id="guestCounter">0</div>
    <p style="text-align:center;">Players + Guests</p>
  </div>

  <div class="card">
    <h2>Claimed Potluck Items</h2>
    <input id="newItem" placeholder="Add a potluck item...">
    <button onclick="addNewItem()">Add Item</button>
    <div id="itemBoard"></div>
  </div>
</div>

<h2 style="text-align:center;">PLAYER SIGN UP</h2>
<div class="player-grid" id="playerGrid"></div>
</div>

<div class="modal" id="signupModal">
  <div class="modal-box">
    <h2 id="modalPlayerName"></h2>
    <label>What are you bringing?</label>
    <select id="foodSelect"></select>

    <label>How many extra guests?</label>
    <select id="guestSelect">
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>

    <button onclick="submitSignup()">Submit</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const people=['Olivia Swank','Charlotte Crosby','Kendall Hopkins','Julia Sagen','Jiyul Kim','Raya Olfatbahr','E Renzoni','Camden Hansen','Julia Franklin','Pimmada Akavanichan','Robi Marshall','Gigi Santos','Peyton Elliott','Natalie Saad','Naomi Adegbenro','Miriam Schneider','Narmin A.','Fay Alathari','Cat Hechter','Coach Valluri'];

let foodItems=['Tortillas','Taco Meat','Chicken','Beans','Rice','Cheese','Lettuce','Salsa','Guacamole','Sour Cream','Chips','Queso','Drinks','Plates','Napkins','Utensils'];

let signups={};
let selectedPlayer='';

function openModal(player){
  selectedPlayer=player;
  document.getElementById('modalPlayerName').innerText=player;

  // Remove foods already claimed by OTHER people
  const takenFoods = Object.entries(signups)
    .filter(([name]) => name !== player)
    .map(([,data]) => data.food);

  const availableFoods = foodItems.filter(item => !takenFoods.includes(item));

  document.getElementById('foodSelect').innerHTML =
    '<option>Select an item</option>' +
    availableFoods.map(item =>
      `<option ${signups[player]?.food===item?'selected':''}>${item}</option>`
    ).join('');

  document.getElementById('guestSelect').value = signups[player]?.guests ?? 0;
  document.getElementById('signupModal').style.display='flex';
}

function closeModal(){
  document.getElementById('signupModal').style.display='none';
}

function addNewItem(){
  const item = document.getElementById('newItem').value.trim();
  if(item && !foodItems.includes(item)){
    foodItems.push(item);
    document.getElementById('newItem').value='';
    renderAll();
  }
}

function submitSignup(){
  signups[selectedPlayer]={
    food:document.getElementById('foodSelect').value,
    guests:Number(document.getElementById('guestSelect').value)
  };

  closeModal();
  launchConfetti();
  renderAll();
}

function launchConfetti(){
  for(let i=0;i<25;i++){
    const confetti=document.createElement('div');
    confetti.className='confetti';
    confetti.innerText=['🎉','✨','🎊'][Math.floor(Math.random()*3)];
    confetti.style.left=Math.random()*100+'vw';
    confetti.style.animationDuration=(Math.random()*2+1)+'s';
    document.body.appendChild(confetti);
    setTimeout(()=>confetti.remove(),3000);
  }
}

function renderAll(){
  // KEEP THE EXACT NAMES-ONLY CARD LAYOUT
  document.getElementById('playerGrid').innerHTML=people.map(person=>`
    <div class="player-card" onclick="openModal('${person}')">
      <h3>${person}</h3>
      <p>${signups[person] ? '✅ Submitted (click to edit)' : 'Click to sign up ✨'}</p>
    </div>
  `).join('');

  // Signup tracker
  document.getElementById('statusBoard').innerHTML=people.map(person=>`
    <div class="${signups[person]?'status-done':'status-pending'}">
      ${person} — ${signups[person]?'✅ Done':'⏳ Pending'}
    </div>
  `).join('');

  // Total attendance = signed-up players + guests
  const totalAttendance = Object.keys(signups).length + Object.values(signups).reduce((sum,s)=>sum+s.guests,0);
  document.getElementById('guestCounter').innerText = totalAttendance;

  // Claimed items list
  document.getElementById('itemBoard').innerHTML = Object.entries(signups).map(([person,data])=>`
  <div style="padding:10px;margin:8px 0;background:#faf5ff;border-radius:12px;display:flex;justify-content:space-between;align-items:center;">
    <span><strong>${data.food}</strong></span>
    <span style="font-size:14px;color:#7c3aed;">claimed by ${person}</span>
  </div>
`).join('') || '<p>No items claimed yet</p>';
}

renderAll();
</script>
</body>
</html>
